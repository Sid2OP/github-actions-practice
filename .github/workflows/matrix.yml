name: matrix 

on:
    workflow_dispatch:
        
jobs:
    validate:

      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
            python-version: [3.8, 3.9 ]


      steps:
        - name: setup python
          uses: actions/setup-python@v4
          with:
              python-version: ${{ matrix.python-version }}
        
        - name: print python version
          run: python --version

