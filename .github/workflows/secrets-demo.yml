name: Secrets Demo

on:
    workflow_dispatch

jobs: 
    check-secret:
        runs-on: ubuntu-latest

        steps:
            - name: Confirm secret is set
              run: |
                if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
                echo "The secret is set: true"
                else
                echo "The secret is set: false"
                fi
            
            - name: What happen if you print directly
              run: echo "${{ secrets.MY-SECRET_MESSAGE }}"